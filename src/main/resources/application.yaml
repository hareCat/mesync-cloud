server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: mesync-cloud
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
app:
  registration:
    invite-ttl: 10m
    invite-cooldown: 1m
    rate-limit-ttl: 10m
    attempts: 10
    nonce-ttl: 30s
  auth:
    rate-limit-ttl: 60s
    attempts: 120
    nonce-ttl: 30s
  revoke:
    ttl: 30d
  cache:
    ttl: 12h
    user-cache-size: 40_000
    device-cache-size: 100_000



