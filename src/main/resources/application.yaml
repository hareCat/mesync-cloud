server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: mesync-cloud
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
app:
  registration:
    invite-ttl: 10m
    invite-cooldown: 1m
    registration-ttl: 10m
    registration-attempts: 10
